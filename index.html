<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Telegram Rich Text Editor</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;700&display=swap" rel="stylesheet">
<!-- تغییر CDN به کلودفلر برای حل مشکل فیلترینگ و لود نشدن در ایران -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>

<style>
/* ── reset & tokens ───────────────────────────── */
*, *::before, *::after { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
:root {
  --bg: #ffffff;
  --text: #0f172a;
  --btn: #2481cc;
  --btn-text: #ffffff;
  --border: #cbd5e1;
  --surface: #f8fafc;
  --danger: #ef4444;
  --mark: #fef08a;
  --code-bg: #f1f5f9;
  --code-color: #d63384;
  --font-main: 'Vazirmatn', system-ui, sans-serif;
  --font-mono: 'Courier New', Courier, monospace;
  --radius: 8px;
  --toolbar-h: 44px;
}
html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: var(--font-main); }
body { padding: 12px; display: flex; flex-direction: column; gap: 12px; min-height: 100vh; }

/* ── header ───────────────────────────── */
.header { display: flex; justify-content: flex-end; }
.lang-btn {
  background: var(--surface); border: 1px solid var(--border);
  padding: 7px 16px; border-radius: var(--radius);
  font-family: var(--font-main); font-size: 13px; font-weight: 700;
  cursor: pointer; touch-action: manipulation;
}

/* ── toolbar ───────────────────────────── */
.toolbar-wrap {
  border: 1px solid var(--border);
  border-radius: var(--radius) var(--radius) 0 0;
  background: var(--surface);
  /* اصلاح جهت تولبار به صورت همیشه چپ‌چین ثابت */
  direction: ltr !important; 
}
.toolbar {
  display: flex; 
  /* غیر فعال کردن اسکرول افقی و چیدمان چند ردیفه خودکار جهت حل دائمی باگ گوشی */
  flex-wrap: wrap; 
  align-items: center; 
  gap: 4px;
  padding: 6px; 
  direction: ltr !important;
  justify-content: flex-start;
}
.toolbar-group { display: flex; align-items: center; gap: 1px; flex-wrap: wrap; }
/* خط جداکننده گروه‌ها همواره بر اساس جهت LTR طراحی می‌شود */
.toolbar-group + .toolbar-group { margin-left: 4px; padding-left: 4px; border-left: 1px solid var(--border); }

.tb-btn {
  width: 32px; height: 32px; border: none; background: transparent;
  border-radius: 6px; cursor: pointer; display: flex; align-items: center; justify-content: center;
  font-family: var(--font-main); font-size: 13px; color: var(--text);
  touch-action: manipulation; padding: 0; flex-shrink: 0;
  user-select: none; -webkit-user-select: none;
}
.tb-btn:hover { background: #e2e8f0; }
.tb-btn.is-active { background: #dbeafe; color: var(--btn); }
.tb-btn svg { pointer-events: none; }

.tb-select {
  height: 28px; border: 1px solid var(--border); border-radius: 5px;
  background: white; font-family: var(--font-main); font-size: 12px;
  padding: 0 4px; cursor: pointer; touch-action: manipulation;
  max-width: 85px;
}

/* ── editor area ───────────────────────── */
.editor-wrap { position: relative; }
.editor-box {
  border: 1px solid var(--border); border-top: none;
  border-radius: 0 0 var(--radius) var(--radius);
  background: white; position: relative;
}
.ProseMirror {
  min-height: 220px; padding: 12px 14px;
  font-size: 16px; line-height: 1.7; outline: none;
  font-family: var(--font-main);
  unicode-bidi: plaintext;
}
.ProseMirror p { margin: 0 0 4px; unicode-bidi: plaintext; text-align: initial; }
.ProseMirror h1,.ProseMirror h2,.ProseMirror h3,
.ProseMirror h4,.ProseMirror h5,.ProseMirror h6 {
  margin: 8px 0 4px; unicode-bidi: plaintext; text-align: initial;
}
.ProseMirror h1 { font-size: 1.8em; } .ProseMirror h2 { font-size: 1.5em; }
.ProseMirror h3 { font-size: 1.3em; } .ProseMirror h4 { font-size: 1.1em; }

.ProseMirror code {
  font-family: var(--font-mono); background: var(--code-bg);
  color: var(--code-color); padding: 2px 5px; border-radius: 4px;
  font-size: 0.88em; direction: ltr; unicode-bidi: embed;
}
.ProseMirror pre {
  background: #1e1e2e; color: #cdd6f4; border-radius: var(--radius);
  padding: 12px 14px; margin: 8px 0; overflow-x: auto; direction: ltr;
}
.ProseMirror pre code {
  background: none; color: inherit; padding: 0;
  font-family: var(--font-mono); font-size: 0.9em;
}
.ProseMirror blockquote {
  border-left: 4px solid var(--btn); margin: 8px 0;
  padding: 4px 0 4px 12px; color: #475569;
}
body.rtl .ProseMirror blockquote {
  border-left: none; border-right: 4px solid var(--btn);
  padding: 4px 12px 4px 0;
}
.ProseMirror hr { border: none; border-top: 2px solid var(--border); margin: 12px 0; }
.ProseMirror mark { background: var(--mark); border-radius: 3px; padding: 1px 2px; }

/* spoiler */
.ProseMirror tg-spoiler {
  background: #334155; color: transparent; border-radius: 4px;
  padding: 1px 4px; cursor: pointer; display: inline;
  text-shadow: 0 0 8px rgba(255,255,255,0.9);
  transition: background 0.2s, color 0.2s, text-shadow 0.2s;
  touch-action: manipulation;
}
.ProseMirror tg-spoiler.revealed {
  background: rgba(51,65,85,0.12); color: inherit; text-shadow: none;
}

/* math */
.tg-math-block {
  display: block; background: var(--surface); border-left: 4px solid var(--btn);
  border-radius: 4px; padding: 12px; margin: 8px 0;
  text-align: center; direction: ltr; overflow-x: auto; cursor: pointer;
}
body.rtl .tg-math-block { border-left: none; border-right: 4px solid var(--btn); }
.tg-math-inline {
  display: inline-block; background: #f0fdf4; border: 1px solid #86efac;
  border-radius: 4px; padding: 1px 5px; margin: 0 2px; direction: ltr;
  cursor: pointer; font-size: 0.95em;
}

/* task list */
.ProseMirror ul[data-type="taskList"] { list-style: none; padding: 0; margin: 4px 0; }
.ProseMirror ul[data-type="taskList"] li {
  display: flex; align-items: flex-start; gap: 8px; padding: 2px 0;
}
.ProseMirror ul[data-type="taskList"] li > label {
  display: flex; align-items: center; min-width: 24px; min-height: 24px;
  cursor: pointer; flex-shrink: 0; margin-top: 2px;
}
.ProseMirror ul[data-type="taskList"] li > label input[type="checkbox"] {
  width: 16px; height: 16px; cursor: pointer; accent-color: var(--btn);
  pointer-events: auto; touch-action: manipulation;
}
.ProseMirror ul[data-type="taskList"] li > div { flex: 1; min-width: 0; unicode-bidi: plaintext; }
.ProseMirror ul[data-type="taskList"] li[data-checked="true"] > div {
  text-decoration: line-through; opacity: 0.6;
}
.ProseMirror ul { padding-left: 20px; margin: 4px 0; }
.ProseMirror ol { padding-left: 20px; margin: 4px 0; }
body.rtl .ProseMirror ul, body.rtl .ProseMirror ol { padding-left: 0; padding-right: 20px; }

/* table */
.ProseMirror table { border-collapse: collapse; width: 100%; margin: 8px 0; min-width: 200px; }
.ProseMirror td, .ProseMirror th {
  border: 1px solid var(--border); padding: 7px 10px; min-width: 40px; position: relative;
}
.ProseMirror th { background: var(--surface); font-weight: 700; }
.ProseMirror .selectedCell::after {
  content: ''; position: absolute; inset: 0;
  background: rgba(36,129,204,0.15); pointer-events: none;
}
.ProseMirror .tableWrapper { overflow-x: auto; }

/* image */
.ProseMirror figure {
  margin: 10px 0; border: 1px dashed var(--btn); padding: 10px;
  background: #f0f9ff; border-radius: var(--radius); text-align: center;
}
.ProseMirror figure img { max-width: 100%; border-radius: 4px; }
.ProseMirror figcaption { font-size: 13px; color: #475569; margin-top: 5px; }
.ProseMirror cite { font-size: 11px; color: #94a3b8; display: block; }

/* details */
.tg-details { border: 1.5px solid var(--border); border-radius: var(--radius); margin: 8px 0; overflow: hidden; }
.tg-details summary {
  font-weight: 700; padding: 10px 14px; background: var(--surface);
  cursor: pointer; outline: none; user-select: none; list-style: none;
}
.tg-details summary::-webkit-details-marker { display: none; }
.tg-details .tg-details-content { padding: 10px 14px; background: white; border-top: 1px solid var(--border); }

/* مخفی کردن فلش پیش‌فرض مرورگرها */
.tg-details summary::-webkit-details-marker {
  display: none;
}
.tg-details summary {
  list-style: none;
  display: flex;
  justify-content: space-between; /* متن سمت راست/چپ و فلش سمت مقابل قرار بگیرد */
  align-items: center;
  cursor: pointer;
  padding: 8px 12px;
  background: #f1f5f9; /* یک پس‌زمینه ملایم برای دکمه */
  border-radius: 6px;
  font-weight: bold;
}

/* استایل آیکون فلش */
.tg-details .details-arrow {
  display: inline-block;
  transition: transform 0.2s ease; /* انیمیشن نرم هنگام چرخیدن */
  transform: rotate(180deg); /* اگر جهت صفحه راست‌به‌چپ (RTL) است، به سمت چپ اشاره کند */
}

/* وقتی تگ details باز می‌شود، فلش بچرخد و رو به پایین شود */
.tg-details details[open] .details-arrow {
  transform: rotate(90deg); 
}

/* استایل بدنه محتوا برای زیبایی بیشتر */
.tg-details-content {
  padding: 10px 12px;
  border: 1px solid #e2e8f0;
  border-top: none;
  border-radius: 0 0 6px 6px;
}

/* placeholder */
.ProseMirror p.is-editor-empty:first-child::before {
  content: attr(data-placeholder); color: #94a3b8; pointer-events: none; float: left; height: 0;
}
body.rtl .ProseMirror p.is-editor-empty:first-child::before { float: right; }

/* ── floating action bar ───────────────── */
.action-bar {
  position: absolute; display: none; background: white;
  border: 1px solid var(--border); border-radius: 24px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.15);
  padding: 3px 6px; z-index: 500; gap: 2px; align-items: center;
  transition: opacity 0.15s ease;
}
.action-bar.visible { display: flex; }
.action-bar button {
  background: none; border: none; padding: 6px 10px;
  border-radius: 18px; cursor: pointer; font-size: 12px; font-weight: 700;
  color: #334155; font-family: var(--font-main); display: flex;
  align-items: center; gap: 4px; touch-action: manipulation;
  white-space: nowrap;
}
.action-bar button:active { background: #e2e8f0; }
.action-bar button.danger { color: var(--danger); }
.action-bar button.danger:active { background: #fee2e2; }
.action-bar .sep { width: 1px; height: 14px; background: var(--border); }

/* ── bottom controls ───────────────────── */
.send-btn {
  background: var(--btn); color: var(--btn-text);
  border: none; border-radius: var(--radius); padding: 14px;
  font-size: 16px; font-weight: 700; font-family: var(--font-main);
  width: 100%; cursor: pointer; touch-action: manipulation;
}
.send-btn:active { opacity: 0.85; }

.preview-wrap { border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
.preview-head { padding: 7px 12px; background: #e2e8f0; font-size: 12px; font-weight: 700; color: #64748b; }
.preview-body {
  padding: 10px 12px; background: var(--surface); font-family: var(--font-mono);
  font-size: 12px; max-height: 180px; overflow-y: auto; white-space: pre;
  word-break: break-all; line-height: 1.5; direction: ltr; color: #334155;
}

/* ── modal ─────────────────────────────── */
.overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.45);
  display: flex; align-items: center; justify-content: center;
  z-index: 1000; opacity: 0; pointer-events: none;
  transition: opacity 0.2s ease;
}
.overlay.open { opacity: 1; pointer-events: auto; }
.modal {
  background: white; border-radius: 14px; padding: 20px;
  width: 92%; max-width: 360px; box-shadow: 0 20px 60px rgba(0,0,0,0.2);
}
.modal h3 { margin: 0 0 14px; font-size: 15px; color: var(--text); }
.field { display: flex; flex-direction: column; gap: 5px; margin-bottom: 12px; }
.field label { font-size: 12px; color: #64748b; font-weight: 600; }
.field input, .field textarea, .field select {
  padding: 9px 10px; border: 1px solid var(--border); border-radius: var(--radius);
  font-size: 14px; font-family: var(--font-main); width: 100%;
}
.field input:focus, .field textarea:focus { border-color: var(--btn); outline: none; }
.field textarea { resize: vertical; min-height: 70px; }
.field.row { flex-direction: row; gap: 10px; }
.field.row > * { flex: 1; }
.field-check { display: flex; align-items: center; gap: 8px; cursor: pointer; font-size: 13px; }
.field-check input { width: 16px; height: 16px; accent-color: var(--btn); }
.math-preview { min-height: 42px; background: var(--surface); border-radius: 6px; padding: 8px; text-align: center; margin-bottom: 12px; overflow-x: auto; }
.modal-btns { display: flex; gap: 8px; }
.modal-btn {
  flex: 1; padding: 10px; border: none; border-radius: var(--radius);
  background: var(--btn); color: white; font-family: var(--font-main);
  font-weight: 700; font-size: 14px; cursor: pointer; touch-action: manipulation;
}
.modal-btn.sec { background: #94a3b8; }
.modal-btn:active { opacity: 0.85; }
</style>
</head>

        <button class="tb-btn" data-cmd="details" title="Collapsible"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg></button>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script type="module">
/* ── imports ─────────────────────────────────────── */
import { Editor, Extension, Node, Mark } from 'https://esm.sh/@tiptap/core@2.11.5'
import StarterKit              from 'https://esm.sh/@tiptap/starter-kit@2.11.5'
import Underline               from 'https://esm.sh/@tiptap/extension-underline@2.11.5'
import { Subscript }           from 'https://esm.sh/@tiptap/extension-subscript@2.11.5'
import { Superscript }         from 'https://esm.sh/@tiptap/extension-superscript@2.11.5'
import Link                    from 'https://esm.sh/@tiptap/extension-link@2.11.5'
import Highlight               from 'https://esm.sh/@tiptap/extension-highlight@2.11.5'
import TaskList                from 'https://esm.sh/@tiptap/extension-task-list@2.11.5'
import TaskItem                from 'https://esm.sh/@tiptap/extension-task-item@2.11.5'
import Table                   from 'https://esm.sh/@tiptap/extension-table@2.11.5'
import TableRow                from 'https://esm.sh/@tiptap/extension-table-row@2.11.5'
import TableCell               from 'https://esm.sh/@tiptap/extension-table-cell@2.11.5'

import Placeholder             from 'https://esm.sh/@tiptap/extension-placeholder@2.11.5'

/* ── translations ────────────────────────────────── */
const T = {
  en: {
    dir:'ltr', langBtn:'🇮🇷 فارسی',
    placeholder:'Type here…',
    sendBtn:'📤 Send', previewHeader:'Output (Telegram HTML):',
    tableTitle:'New Table', tableRows:'Rows', tableCols:'Columns',
    linkTitle:'Insert Link', linkUrl:'URL', linkText:'Display Text (optional)',
    imgTitle:'Insert Image', imgUrl:'URL (required)', imgCaption:'Caption', imgCredit:'Credit',
    mathLabel:'LaTeX (without $)', mathTitleBlock:'Block Math', mathTitleInline:'Inline Math',
    mathEditBlock:'Edit Block Math', mathEditInline:'Edit Inline Math',
    detailsTitle:'Insert Collapsible', detailsEditTitle:'Edit Collapsible',
    detailsLabelTitle:'Title', detailsLabelContent:'Content', detailsLabelOpen:'Open by default',
    successMessage:'HTML copied!<br>Go back to the bot, paste and send it, then choose HTML.',
    btnInsert:'Create', btnCancel:'Cancel', btnInsertImg:'Insert', btnInsertMath:'Insert',
    btnInsertDetails:'Insert', btnOk:'Got it',
    addRow:'+ Row', addCol:'+ Col', delRow:'- Row', delCol:'- Col',
    mathEditBtn:'✏️ Edit', mathDelBtn:'🗑️ Delete',
    detailsEditBtn:'✏️ Edit', detailsDelBtn:'🗑️ Delete',
    previewPlaceholder: 'Preview will appear here...'
  },
  fa: {
    dir:'rtl', langBtn:'🇺🇸 English',
    placeholder:'متن خود را اینجا بنویسید…',
    sendBtn:'📤 ارسال', previewHeader:'خروجی (HTML تلگرام):',
    tableTitle:'جدول جدید', tableRows:'سطرها', tableCols:'ستون‌ها',
    linkTitle:'درج لینک', linkUrl:'آدرس', linkText:'متن نمایشی (اختیاری)',
    imgTitle:'درج تصویر', imgUrl:'آدرس (اجباری)', imgCaption:'کپشن', imgCredit:'منبع',
    mathLabel:'فرمول LaTeX (بدون $)', mathTitleBlock:'فرمول بلوکی', mathTitleInline:'فرمول درون‌خطی',
    mathEditBlock:'ویرایش فرمول بلوکی', mathEditInline:'ویرایش فرمول درون‌خطی',
    detailsTitle:'درج بخش تاشو', detailsEditTitle:'ویرایش بخش تاشو',
    detailsLabelTitle:'عنوان', detailsLabelContent:'محتوا', detailsLabelOpen:'پیش‌فرض باز',
    successMessage:'HTML کپی شد!<br>به ربات برگردید، پیست کنید و گزینه HTML را انتخاب کنید.',
    btnInsert:'ایجاد', btnCancel:'لغو', btnInsertImg:'درج', btnInsertMath:'ثبت',
    btnInsertDetails:'درج', btnOk:'متوجه شدم',
    addRow:'+ سطر', addCol:'+ ستون', delRow:'- سطر', delCol:'- ستون',
    mathEditBtn:'✏️ ویرایش', mathDelBtn:'🗑️ حذف',
    detailsEditBtn:'✏️ ویرایش', detailsDelBtn:'🗑️ حذف',
    previewPlaceholder: 'پیش‌نمایش فرمول اینجا ظاهر می‌شود...'
  }
}
let lang = 'en'

/* ── custom Mark: Spoiler ─────────────────────────── */
const Spoiler = Mark.create({
  name: 'spoiler',
  parseHTML() { return [{ tag: 'tg-spoiler' }] },
  renderHTML({ HTMLAttributes }) { return ['tg-spoiler', HTMLAttributes, 0] },
  addCommands() {
    return { toggleSpoiler: () => ({ commands }) => commands.toggleMark(this.name) }
  }
})

/* ── custom Node: Inline Math ─────────────────────── */
const MathInline = Node.create({
  name: 'mathInline',
  group: 'inline', inline: true, atom: true,
  addAttributes() { return { formula: { default: '' } } },
  parseHTML() {
    return [
      { tag: 'tg-math' },
      { tag: 'span.tg-math-inline', getAttrs: dom => ({ formula: dom.getAttribute('data-formula') || '' }) }
    ]
  },
  renderHTML({ node }) {
    return ['tg-math', { 'data-formula': node.attrs.formula }, `$${node.attrs.formula}$`]
  },
  addNodeView() {
    return ({ node }) => {
      const dom = document.createElement('span')
      dom.className = 'tg-math-inline'
      dom.setAttribute('data-formula', node.attrs.formula)
      dom.setAttribute('contenteditable', 'false') // جلوگیری از ورود مکان‌نما به ساختار کاتکس
      
      const render = () => {
        if (window.katex) {
          try { window.katex.render(node.attrs.formula, dom, { throwOnError:false }) }
          catch { dom.textContent = node.attrs.formula }
        } else { 
          dom.textContent = `$${node.attrs.formula}$` // پشتیبان متنی فرمول در صورت قطع بودن اینترنت
          dom.style.color = 'var(--text)'
        }
      }
      
      render()

      return {
        dom,
        update: (updatedNode) => {
          if (updatedNode.type !== node.type) return false
          if (updatedNode.attrs.formula !== node.attrs.formula) {
            node = updatedNode
            dom.setAttribute('data-formula', node.attrs.formula)
            render()
          }
          return true
        }
      }
    }
  },
  addCommands() {
    return { insertMathInline: (formula) => ({ commands }) =>
      commands.insertContent({ type: this.name, attrs: { formula } }) }
  }
})

/* ── custom Node: Block Math ──────────────────────── */
const MathBlock = Node.create({
  name: 'mathBlock',
  group: 'block', atom: true,
  addAttributes() { return { formula: { default: '' } } },
  parseHTML() {
    return [
      { tag: 'tg-math-block' },
      { tag: 'div.tg-math-block', getAttrs: dom => ({ formula: dom.getAttribute('data-formula') || '' }) }
    ]
  },
  renderHTML({ node }) {
    return ['tg-math-block', { 'data-formula': node.attrs.formula }, `$${node.attrs.formula}$`]
  },
  addNodeView() {
    return ({ node }) => {
      const dom = document.createElement('div')
      dom.className = 'tg-math-block'
      dom.setAttribute('data-formula', node.attrs.formula)
      dom.setAttribute('contenteditable', 'false') // جلوگیری از ورود مکان‌نما به ساختار کاتکس
      
      const render = () => {
        if (window.katex) {
          try { window.katex.render(node.attrs.formula, dom, { displayMode:true, throwOnError:false }) }
          catch { dom.textContent = node.attrs.formula }
        } else { 
          dom.textContent = `$$${node.attrs.formula}$$` // پشتیبان متنی فرمول در صورت قطع بودن اینترنت
          dom.style.color = 'var(--text)'
        }
      }
      
      render()

      return {
        dom,
        update: (updatedNode) => {
          if (updatedNode.type !== node.type) return false
          if (updatedNode.attrs.formula !== node.attrs.formula) {
            node = updatedNode
            dom.setAttribute('data-formula', node.attrs.formula)
            render()
          }
          return true
        }
      }
    }
  },
  addCommands() {
    return { insertMathBlock: (formula) => ({ commands }) =>
      commands.insertContent({ type: this.name, attrs: { formula } }) }
  }
})

/* ── custom Node: Details ─────────────────────────── */
const Details = Node.create({
  name: 'details',
  group: 'block', atom: true,
  addAttributes() {
    return { title: { default: '' }, content: { default: '' }, open: { default: false } }
  },
  parseHTML() {
    return [
      { tag: 'details', getAttrs: dom => ({
          title: dom.querySelector('summary')?.textContent || '',
          content: dom.querySelector('.tg-details-content')?.innerHTML || dom.textContent || '',
          open: dom.hasAttribute('open')
        })
      }
    ]
  },
  renderHTML({ node }) {
    const openAttr = node.attrs.open ? { open: 'true' } : {}
    return ['details', openAttr,
      ['summary', {}, node.attrs.title || 'Details'],
      ['div', { class: 'tg-details-content' }, node.attrs.content || '']
    ]
  },
  addNodeView() {
    return ({ node, HTMLAttributes, decoration, view, getPos }) => {
      const wrap = document.createElement('div')
      wrap.className = 'tg-details'
      wrap.setAttribute('data-details', '')
      wrap.setAttribute('data-title', node.attrs.title)
      wrap.setAttribute('data-content', node.attrs.content)
      wrap.setAttribute('data-open', node.attrs.open)
      
      const det = document.createElement('details')
      // وضعیت اولیه باز یا بسته بودن تگ بر اساس اتریبیوت اصلی تعیین می‌شود
      if (node.attrs.open) det.open = true
      
      const sum = document.createElement('summary')
      
      const titleSpan = document.createElement('span')
      titleSpan.textContent = node.attrs.title || 'Collapsible'
      
      const arrowSpan = document.createElement('span')
      arrowSpan.className = 'details-arrow'
      arrowSpan.innerHTML = '➔'
      
      sum.appendChild(titleSpan)
      sum.appendChild(arrowSpan)
      
      const cont = document.createElement('div')
      cont.className = 'tg-details-content'
      cont.innerHTML = (node.attrs.content || '').replace(/\n/g, '<br>')
      
      det.appendChild(sum)
      det.appendChild(cont)
      wrap.appendChild(det)

      // 🛑 رویداد toggle قبلی از اینجا حذف شد تا باز و بسته کردن دستی، دیتا را دستکاری نکند.

      return { 
        dom: wrap,
        update: updatedNode => {
          if (updatedNode.type !== node.type) return false
          node = updatedNode
          titleSpan.textContent = node.attrs.title || 'Collapsible'
          cont.innerHTML = (node.attrs.content || '').replace(/\n/g, '<br>')
          det.open = node.attrs.open
          wrap.setAttribute('data-title', node.attrs.title)
          wrap.setAttribute('data-content', node.attrs.content)
          wrap.setAttribute('data-open', node.attrs.open)
          return true
        }
      }
    }
  },
  addCommands() {
    return { insertDetails: (attrs) => ({ commands }) =>
      commands.insertContent({ type: this.name, attrs }) }
  }
})

/* ── custom Node: TelegramImage ──────────────────── */
const TelegramImage = Node.create({
  name: 'telegramImage',
  group: 'block', atom: true,
  addAttributes() {
    return { src:{default:''}, caption:{default:''}, credit:{default:''} }
  },
  parseHTML() {
    return [
      { tag: 'figure[data-tg-image]' },
      { tag: 'figure', getAttrs: dom => ({
          src: dom.querySelector('img')?.getAttribute('src') || '',
          caption: dom.querySelector('figcaption')?.firstChild?.textContent || '',
          credit: dom.querySelector('cite')?.textContent || ''
        })
      }
    ]
  },
  renderHTML({ node }) {
    const children = [['img', { src: node.attrs.src }]]
    if (node.attrs.caption) {
      const capChildren = [node.attrs.caption]
      if (node.attrs.credit) {
        capChildren.push(['cite', {}, node.attrs.credit])
      }
      children.push(['figcaption', {}, ...capChildren])
    }
    return ['figure', { 'data-tg-image': '' }, ...children]
  },
  addNodeView() {
    return ({ node }) => {
      const fig = document.createElement('figure')
      fig.setAttribute('data-tg-image','')
      const img = document.createElement('img')
      img.src = node.attrs.src
      fig.appendChild(img)
      if (node.attrs.caption) {
        const cap = document.createElement('figcaption')
        cap.textContent = node.attrs.caption
        fig.appendChild(cap)
      }
      if (node.attrs.credit) {
        const cit = document.createElement('cite')
        cit.textContent = node.attrs.credit
        fig.appendChild(cit)
      }
      return { dom: fig }
    }
  },
  addCommands() {
    return { insertTelegramImage: (attrs) => ({ commands }) =>
      commands.insertContent({ type: this.name, attrs }) }
  }
})

/* ── init editor ─────────────────────────────────── */
const editor = new Editor({
  element: document.getElementById('editor'),
  extensions: [
    StarterKit.configure({
      heading: { levels:[1,2,3,4,5,6] },
      code: { HTMLAttributes:{} },
      codeBlock: {},
      blockquote: {},
      horizontalRule: {},
      bulletList: {},
      orderedList: {},
      listItem: {},
      bold: {}, italic: {}, strike: {},
    }),
    Underline,
    Subscript, Superscript,
    Highlight.configure({ multicolor: false }),
    Link.configure({ openOnClick: false, HTMLAttributes:{ rel:null, target:null } }),
    TaskList,
    TaskItem.configure({ nested: false }),
    Table.configure({ resizable: false }),
    TableRow, TableCell, TableHeader,
    Placeholder.configure({ placeholder: () => T[lang].placeholder }),
    Spoiler, MathInline, MathBlock, Details, TelegramImage,
  ],
  editorProps: {
    attributes: { spellcheck: 'false' }
  },
  onUpdate({ editor }) {
    updatePreview()
    
    // حل باگ موبایل برای دو اینتر در کدبلاک و پاک کردن خطوط اضافه
    const { state } = editor
    const { selection } = state
    const { $from } = selection
    
    if ($from.parent.type.name === 'codeBlock') {
      const text = $from.parent.textContent
      
      // اگر متن بلاک با دو خط خالی تمام شده باشد
      if (text.endsWith('\n\n\n')) {
        // محاسبه متن جدید بدون دو کاراکتر \n آخر
        const cleanedText = text.slice(0, -3)
        
        // پیدا کردن پوزیشن شروع و پایان دقیق کدبلاک جاری
        const startPos = $from.before($from.depth) + 1
        const endPos = $from.after($from.depth) - 1
        
        editor.chain()
          // ۱. کل متن کدبلاک را با متن تمیز شده (بدون دو اینتر) جایگزین می‌کنیم
          .insertContentAt({ from: startPos, to: endPos }, cleanedText)
          // ۲. حالا با خیال راحت از کدبلاک خارج می‌شویم
          .exitCode()
          .run()
      }
    }
  },
  onSelectionUpdate() { syncToolbarState() },
})

/* ── language ─────────────────────────────────────── */
function setLang(l) {
  lang = l
  const t = T[l]
  document.body.classList.toggle('rtl', l === 'fa')
  document.body.style.direction = t.dir

  const placeholderExt = editor.extensionManager.extensions.find(e => e.name === 'placeholder')
  if (placeholderExt) {
    placeholderExt.options.placeholder = t.placeholder
    editor.view.dispatch(editor.state.tr)
  }
  const editableEl = document.querySelector('#editor .ProseMirror')
  if (editableEl) {
    editableEl.setAttribute('data-placeholder', t.placeholder)
  }

  document.querySelectorAll('[data-key]').forEach(el => {
    const k = el.getAttribute('data-key')
    if (!t[k]) return
    if (k === 'successMessage') el.innerHTML = t[k]
    else el.textContent = t[k]
  })

  document.getElementById('langBtn').textContent = t.langBtn
  renderMathPreview()
}

document.getElementById('langBtn').addEventListener('click', () => setLang(lang === 'en' ? 'fa' : 'en'))

/* ── toolbar state sync ───────────────────────────── */
function syncToolbarState() {
  const checks = {
    bold: 'bold', italic: 'italic', underline: 'underline', strike: 'strike',
    mark: 'highlight', spoiler: 'spoiler', sub: 'subscript', sup: 'superscript',
    blockquote: 'blockquote', inlineCode: 'code', codeBlock: 'codeBlock',
    bulletList: 'bulletList', orderedList: 'orderedList', taskList: 'taskList',
  }
  document.querySelectorAll('.tb-btn[data-cmd]').forEach(btn => {
    const cmd = btn.dataset.cmd
    const ext = checks[cmd]
    if (ext) btn.classList.toggle('is-active', editor.isActive(ext))
  })
  const hSel = document.getElementById('headingSelect')
  let hVal = '0'
  for (let i=1;i<=6;i++) if (editor.isActive('heading', {level:i})) { hVal=String(i); break }
  hSel.value = hVal
}

/* ── touch focus & cmd helper ─────────────────────── */
function bindButton(btn, callback) {
  if (!btn) return

  const trigger = (e) => {
    e.preventDefault()
    callback()
    syncToolbarState()
  }

  btn.addEventListener('mousedown', e => {
    if (e.defaultPrevented) return
    trigger(e)
  })

  btn.addEventListener('touchstart', e => {
    trigger(e)
  }, { passive: false })
}

/* ── toolbar commands ─────────────────────────────── */
document.querySelectorAll('.tb-btn[data-cmd]').forEach(btn => {
  const cmd = btn.dataset.cmd
  bindButton(btn, () => {
    const chain = editor.chain().focus()
    switch (cmd) {
      case 'bold':        chain.toggleBold().run(); break
      case 'italic':      chain.toggleItalic().run(); break
      case 'underline':   chain.toggleUnderline().run(); break
      case 'strike':      chain.toggleStrike().run(); break
      case 'mark':        chain.toggleHighlight().run(); break
      case 'spoiler':     chain.toggleMark('spoiler').run(); break
      case 'sub':         chain.toggleSubscript().run(); break
      case 'sup':         chain.toggleSuperscript().run(); break
      case 'blockquote':  chain.toggleBlockquote().run(); break
      case 'inlineCode':  chain.toggleCode().run(); break
      case 'codeBlock':   chain.toggleCodeBlock().run(); break
      case 'bulletList':  chain.toggleBulletList().run(); break
      case 'orderedList': chain.toggleOrderedList().run(); break
      case 'taskList':    chain.toggleTaskList().run(); break
      case 'hr':          chain.setHorizontalRule().run(); break
      case 'clear':       chain.unsetAllMarks().clearNodes().run(); break
      case 'mathInline':  openMathModal('inline', null); break
      case 'mathBlock':   openMathModal('block', null); break
      case 'table':       openTableModal(); break
      case 'details':     openDetailsModal(null); break
      case 'link':        openLinkModal(); break
      case 'image':       openImageModal(); break
    }
  })
})

let savedSelection = null
const saveSel = () => {
  if (editor.isFocused) {
    savedSelection = editor.state.selection
  }
}
document.getElementById('headingSelect').addEventListener('mousedown', saveSel)
document.getElementById('headingSelect').addEventListener('touchstart', saveSel)

document.getElementById('headingSelect').addEventListener('change', e => {
  const v = parseInt(e.target.value)
  let chain = editor.chain()
  if (savedSelection) {
    chain = chain.setTextSelection(savedSelection)
  }
  chain = chain.focus()
  if (v === 0) chain.setParagraph().run()
  else chain.toggleHeading({ level: v }).run()
  savedSelection = null
  syncToolbarState()
})

/* ── modal helpers ────────────────────────────────── */
function openModal(id) { document.getElementById(id).classList.add('open') }
function closeModal(id) { document.getElementById(id).classList.remove('open') }

document.querySelectorAll('.overlay').forEach(ov => {
  const closeOv = (e) => { if (e.target === ov) ov.classList.remove('open') }
  ov.addEventListener('mousedown', closeOv)
  ov.addEventListener('touchstart', closeOv)
})

/* ── link modal ───────────────────────────────────── */
function openLinkModal() {
  const existingUrl = editor.getAttributes('link').href || ''
  document.getElementById('linkUrl').value = existingUrl
  const { from, to } = editor.state.selection
  const selectedText = editor.state.doc.textBetween(from, to, ' ')
  document.getElementById('linkText').value = selectedText

  openModal('linkModal')
  setTimeout(() => document.getElementById('linkUrl').focus(), 80)
}
document.getElementById('closeLinkModal').addEventListener('click', () => closeModal('linkModal'))
document.getElementById('doInsertLink').addEventListener('click', () => {
  const url = document.getElementById('linkUrl').value.trim()
  const text = document.getElementById('linkText').value.trim()
  if (!url) return
  const chain = editor.chain().focus()
  if (text) chain.insertContent(`<a href="${url}">${text}</a>`)
  else chain.setLink({ href: url })
  chain.run()
  closeModal('linkModal')
})

/* ── table modal ──────────────────────────────────── */
function openTableModal() {
  document.getElementById('tRows').value = "3"
  document.getElementById('tCols').value = "2"
  openModal('tableModal')
}
document.getElementById('closeTableModal').addEventListener('click', () => closeModal('tableModal'))
document.getElementById('doInsertTable').addEventListener('click', () => {
  const rows = parseInt(document.getElementById('tRows').value) || 3
  const cols = parseInt(document.getElementById('tCols').value) || 2
  editor.chain().focus().insertTable({ rows, cols, withHeaderRow: true }).run()
  closeModal('tableModal')
})

/* ── image modal ──────────────────────────────────── */
function openImageModal() {
  document.getElementById('imgUrl').value = ""
  document.getElementById('imgCaption').value = ""
  document.getElementById('imgCredit').value = ""
  openModal('imageModal')
  setTimeout(() => document.getElementById('imgUrl').focus(), 80)
}
document.getElementById('closeImageModal').addEventListener('click', () => closeModal('imageModal'))
document.getElementById('doInsertImage').addEventListener('click', () => {
  const src = document.getElementById('imgUrl').value.trim()
  if (!src) return
  editor.chain().focus().insertTelegramImage({
    src,
    caption: document.getElementById('imgCaption').value.trim(),
    credit:  document.getElementById('imgCredit').value.trim(),
  }).run()
  closeModal('imageModal')
})

/* ── math modal ───────────────────────────────────── */
let mathTarget = 'block'
let mathEditPos = null

function openMathModal(type, editData) {
  mathTarget = type
  mathEditPos = editData ? editData.pos : null
  const t = T[lang]
  const titleEl = document.getElementById('mathModalTitle')
  if (editData) titleEl.textContent = type === 'block' ? t.mathEditBlock : t.mathEditInline
  else          titleEl.textContent = type === 'block' ? t.mathTitleBlock : t.mathTitleInline

  document.getElementById('mathInput').value = editData ? editData.formula : ''
  renderMathPreview()
  openModal('mathModal')
  setTimeout(() => document.getElementById('mathInput').focus(), 80)
}

function renderMathPreview() {
  const val = document.getElementById('mathInput').value.trim()
  const el = document.getElementById('mathPreview')
  if (!window.katex) {
    el.innerHTML = `<span style="color: var(--danger); font-size: 13px;">KaTeX library failed to load. Please check your connection.</span>`
    return
  }
  if (val) {
    try { window.katex.render(val, el, { displayMode: mathTarget==='block', throwOnError:false }) }
    catch { el.textContent = val }
  } else {
    el.innerHTML = `<span style="color: #94a3b8; font-style: italic;">${T[lang].previewPlaceholder}</span>`
  }
}

document.getElementById('mathInput').addEventListener('input', renderMathPreview)
document.getElementById('closeMathModal').addEventListener('click', () => closeModal('mathModal'))
document.getElementById('doInsertMath').addEventListener('click', () => {
  const formula = document.getElementById('mathInput').value.trim()
  if (!formula) return
  const chain = editor.chain().focus()
  if (mathEditPos !== null) {
    chain.deleteRange({ from: mathEditPos, to: mathEditPos + 1 })
  }
  if (mathTarget === 'block') chain.insertMathBlock(formula)
  else chain.insertMathInline(formula)
  chain.run()
  closeModal('mathModal')
  mathTarget = 'block'
  mathEditPos = null
})

/* ── details modal ────────────────────────────────── */
let detailsEditPos = null

function openDetailsModal(editData) {
  detailsEditPos = editData ? editData.pos : null
  const t = T[lang]
  document.getElementById('detailsModalTitle').textContent = editData ? t.detailsEditTitle : t.detailsTitle
  document.getElementById('detailsTitleInput').value = editData ? editData.title : ''
  document.getElementById('detailsContentInput').value = editData ? editData.content : ''
  document.getElementById('detailsOpen').checked = editData ? editData.open : false
  openModal('detailsModal')
  setTimeout(() => document.getElementById('detailsTitleInput').focus(), 80)
}

document.getElementById('closeDetailsModal').addEventListener('click', () => closeModal('detailsModal'))
document.getElementById('doInsertDetails').addEventListener('click', () => {
  const title   = document.getElementById('detailsTitleInput').value.trim() || 'Details'
  const content = document.getElementById('detailsContentInput').value.trim()
  const open    = document.getElementById('detailsOpen').checked
  const chain   = editor.chain().focus()
  if (detailsEditPos !== null) chain.deleteRange({ from: detailsEditPos, to: detailsEditPos + 1 })
  chain.insertDetails({ title, content, open }).run()
  closeModal('detailsModal')
  detailsEditPos = null
})

/* ── floating action bars positioning ──────────────── */
let activeTablePos = null, activeMathPos = null, activeDetailsPos = null

function hideAllBars() {
  document.getElementById('tableBar').classList.remove('visible')
  document.getElementById('mathBar').classList.remove('visible')
  document.getElementById('detailsBar').classList.remove('visible')
}

function positionBar(barEl, targetEl) {
  const wrapEl  = document.getElementById('editorWrap')
  const wrapRect = wrapEl.getBoundingClientRect()
  const tRect   = targetEl.getBoundingClientRect()
  let top  = tRect.top - wrapRect.top - 48
  let left = tRect.left - wrapRect.left + tRect.width/2 - 80
  if (top < 2) top = tRect.bottom - wrapRect.top + 6
  
  barEl.classList.add('visible')
  const barWidth = barEl.offsetWidth || 180
  const maxLeft = wrapRect.width - barWidth - 4
  left = Math.min(maxLeft, Math.max(4, left))
  
  barEl.style.top  = top + 'px'
  barEl.style.left = left + 'px'
  barEl.style.direction = T[lang].dir
}

// Click inside editor — detect special nodes
document.getElementById('editor').addEventListener('click', e => {
  hideAllBars()

  const spoilerEl = e.target.closest('tg-spoiler')
  if (spoilerEl) { spoilerEl.classList.toggle('revealed'); return }

  const mathEl = e.target.closest('.tg-math-block, .tg-math-inline')
  if (mathEl) {
    try {
      const pos = editor.view.posAtDOM(mathEl, 0)
      const node = editor.state.doc.nodeAt(pos)
      if (!node) return
      activeMathPos = pos
      const type = mathEl.classList.contains('tg-math-block') ? 'block' : 'inline'
      const bar = document.getElementById('mathBar')
      bar.dataset.mathType = type
      positionBar(bar, mathEl)
    } catch (err) { console.error(err) }
    return
  }

  const tdEl = e.target.closest('td, th')
  if (tdEl) {
    const bar = document.getElementById('tableBar')
    positionBar(bar, tdEl)
    return
  }

  const detEl = e.target.closest('[data-details]')
  if (detEl) {
    try {
      const pos = editor.view.posAtDOM(detEl, 0)
      activeDetailsPos = pos
      const bar = document.getElementById('detailsBar')
      positionBar(bar, detEl)
    } catch (err) { console.error(err) }
  }
})

editor.on('selectionUpdate', hideAllBars)

/* ── math bar buttons ─────────────────────────────── */
bindButton(document.getElementById('mb-edit'), () => {
  if (activeMathPos === null) return
  const node = editor.state.doc.nodeAt(activeMathPos)
  if (!node) return
  const type = document.getElementById('mathBar').dataset.mathType
  openMathModal(type, { pos: activeMathPos, formula: node.attrs.formula })
  hideAllBars()
})
bindButton(document.getElementById('mb-del'), () => {
  if (activeMathPos === null) return
  editor.chain().focus().deleteRange({ from: activeMathPos, to: activeMathPos+1 }).run()
  hideAllBars()
})

/* ── table bar buttons ────────────────────────────── */
bindButton(document.getElementById('tb-addRow'), () => {
  editor.chain().focus().addRowAfter().run()
})
bindButton(document.getElementById('tb-addCol'), () => {
  editor.chain().focus().addColumnAfter().run()
})
bindButton(document.getElementById('tb-delRow'), () => {
  editor.chain().focus().deleteRow().run()
  hideAllBars()
})
bindButton(document.getElementById('tb-delCol'), () => {
  editor.chain().focus().deleteColumn().run()
  hideAllBars()
})

/* ── details bar buttons ──────────────────────────── */
bindButton(document.getElementById('db-edit'), () => {
  if (activeDetailsPos === null) return
  const node = editor.state.doc.nodeAt(activeDetailsPos)
  if (!node) return
  openDetailsModal({ pos: activeDetailsPos, ...node.attrs })
  hideAllBars()
})
bindButton(document.getElementById('db-del'), () => {
  if (activeDetailsPos === null) return
  editor.chain().focus().deleteRange({ from: activeDetailsPos, to: activeDetailsPos+1 }).run()
  hideAllBars()
})

/* ── EXPORT: generate Telegram HTML ──────────────── */
function nodeToHtml(node) {
  if (node.type.name === 'text') {
    let s = escHtml(node.text)
    const marks = [...(node.marks || [])].reverse()
    for (const m of marks) {
      switch (m.type.name) {
        case 'bold':       s = `<b>${s}</b>`; break
        case 'italic':     s = `<i>${s}</i>`; break
        case 'underline':  s = `<u>${s}</u>`; break
        case 'strike':     s = `<s>${s}</s>`; break
        case 'code':       s = `<code>${s}</code>`; break
        case 'highlight':  s = `<mark>${s}</mark>`; break
        case 'spoiler':    s = `<tg-spoiler>${s}</tg-spoiler>`; break
        case 'subscript':  s = `<sub>${s}</sub>`; break
        case 'superscript':s = `<sup>${s}</sup>`; break
        case 'link':       s = `<a href="${escAttr(m.attrs.href || '')}">${s}</a>`; break
      }
    }
    return s
  }

  const children = () => node.content ? Array.from({length:node.childCount}, (_,i)=>node.child(i)).map(nodeToHtml).join('') : ''

  switch (node.type.name) {
    case 'doc':           return children()
    case 'paragraph': {
      const content = children()
      // اگر پاراگراف کاملاً خالی بود، آن را تبدیل به یک <br> تکی میکنیم
      // در غیر این صورت متن آن را به همراه یک <br> در انتها برمی‌گردانیم تا خط بعدی جدا شود
      return content === '' ? '<br>' : `${content}<br>`
    }
    case 'heading':       return `\n<h${node.attrs.level}>${children()}</h${node.attrs.level}>`
    case 'blockquote':    return `\n<blockquote>${children()}</blockquote>`
    case 'codeBlock':     return `\n<pre><code>${children()}</code></pre>`
    case 'horizontalRule':return `\n<hr>`
    case 'bulletList':    return `\n<ul>${children()}</ul>`
    case 'orderedList':   return `\n<ol>${children()}</ol>`
    case 'listItem':      return `\n<li>${children()}</li>`
    case 'taskList': {
      const items = Array.from({length:node.childCount},(_,i)=>node.child(i))
      const html = items.map(item => {
        const checked = item.attrs.checked
        const cb = checked ? '<input type="checkbox" checked>' : '<input type="checkbox">'
        const content = Array.from({length:item.childCount},(_,i)=>item.child(i)).map(nodeToHtml).join('')
        return `\n<li>${cb}${content.replace(/<\/?p>/g,'')}</li>`
      }).join('')
      return `\n<ul>${html}\n</ul>`
    }
    case 'table': {
      let rows = ''
      node.forEach(rowNode => {
        let cells = ''
        let isHeader = false
        rowNode.forEach(cellNode => {
          isHeader = cellNode.type.name === 'tableHeader'
          const tag = isHeader ? 'th' : 'td'
          cells += `<${tag}>${Array.from({length:cellNode.childCount},(_,i)=>cellNode.child(i)).map(nodeToHtml).join('').replace(/<\/?p>/g,'')}</${tag}>`
        })
        rows += `\n<tr>${cells}</tr>`
      })
      return `\n<table bordered striped>${rows}\n</table>`
    }
    case 'mathBlock':   return `\n<tg-math-block>$${escHtml(node.attrs.formula)}$</tg-math-block>`
    case 'mathInline':  return `<tg-math>$${escHtml(node.attrs.formula)}$</tg-math>`
    case 'details': {
      const openAttr = node.attrs.open ? ' open' : ''
      return `\n<details${openAttr}>\n<summary>${escHtml(node.attrs.title)}</summary>${escHtml(node.attrs.content).replace(/\n/g,'<br>')}\n</details>`
    }
    case 'telegramImage': {
      const src = escAttr(node.attrs.src)
      const cap = node.attrs.caption ? `\n<figcaption>${escHtml(node.attrs.caption)}${node.attrs.credit ? `<cite>${escHtml(node.attrs.credit)}</cite>` : ''}</figcaption>` : ''
      return `\n<figure>\n<img src="${src}">${cap}\n</figure>`
    }
    default: return children()
  }
}

function escHtml(s='') {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
}
function escAttr(s='') {
  return String(s).replace(/"/g,'&quot;')
}

function getTelegramHtml() {
  const raw = nodeToHtml(editor.state.doc)
  const merged = raw.replace(/<\/blockquote>\n<blockquote>/g, '\n')
  let finalized = merged.trim().replace(/\n{3,}/g, '\n\n')

  // بررسی می‌کند که آیا متن با <br> یا <br/> یا <br /> تمام شده است یا خیر
  // در صورت وجود، دقیقاً آخرین <br> را حذف می‌کند
  if (finalized.endsWith('<br>')) {
    finalized = finalized.slice(0, -4) // طول "<br>" برابر 4 کاراکتر است
  } else if (finalized.endsWith('<br/>')) {
    finalized = finalized.slice(0, -5) // طول "<br/>" برابر 5 کاراکتر است
  } else if (finalized.endsWith('<br />')) {
    finalized = finalized.slice(0, -6) // طول "<br />" برابر 6 کاراکتر است
  }
  return finalized
}

/* ── preview ──────────────────────────────────────── */
function updatePreview() {
  const previewEl = document.getElementById('preview')
  if (previewEl) {
    previewEl.textContent = getTelegramHtml()
  }
}
updatePreview()

/* ── copy & send ──────────────────────────────────── */
document.getElementById('sendBtn').addEventListener('click', () => {
  const html = getTelegramHtml()
  const doSuccess = () => openModal('successModal')
  if (navigator.clipboard && location.protocol !== 'http:') {
    navigator.clipboard.writeText(html).then(doSuccess).catch(() => fallbackCopy(html, doSuccess))
  } else {
    fallbackCopy(html, doSuccess)
  }
})

function fallbackCopy(text, cb) {
  const ta = document.createElement('textarea')
  ta.value = text
  ta.style.cssText = 'position:fixed;top:-9999px;left:-9999px;width:2em;height:2em;padding:0;border:none;outline:none;box-shadow:none;background:transparent;'
  document.body.appendChild(ta)
  ta.focus()
  ta.select()
  try {
    const successful = document.execCommand('copy')
    if (successful) cb()
    else alert('Could not copy. Please copy manually.')
  } catch (err) {
    alert('Could not copy. Please copy manually.')
  }
  ta.remove()
}

document.getElementById('closeSuccessModal').addEventListener('click', () => closeModal('successModal'))

/* ── Telegram WebApp Setup ───────────────────────── */
if (window.Telegram && window.Telegram.WebApp) {
  const tg = window.Telegram.WebApp
  tg.ready()
  tg.expand()
}

setLang('en')
